<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honorarios Abogado Penal</title>
    <style>
        @media (max-width: 600px) {
            h1 {
                font-size: 22px !important;
                margin-top: 20px !important;
            }
            .btn-descarga {
                font-size: 13px !important;
                padding: 14px 10px !important;
                text-align: center !important;
                white-space: normal !important;
                display: flex !important;
                justify-content: center;
                align-items: center;
            }
        }
    </style>
</head>
<body style="font-family: sans-serif; padding: 20px 15px; background-image: linear-gradient(rgba(244, 246, 249, 0.2), rgba(244, 246, 249, 0.2)), url('Suraa.png'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; max-width: 900px; margin: 0 auto; text-align: center; box-sizing: border-box;">

    <h1 style="color: #1a1a1a; font-size: 32px; font-weight: 800; margin-top: 40px; margin-bottom: 10px; text-shadow: 1px 1px 3px rgba(255,255,255,0.9); letter-spacing: -0.5px; display: inline-block; border-bottom: 4px solid #2d6df6; padding-bottom: 8px;">
        Honorarios Abogado Penal
    </h1>
    <p style="color: #333; margin-top: 15px; margin-bottom: 40px; font-size: 15px; font-weight: bold; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); padding: 0 10px;">
        Haz clic en el botón para descargar el documento:
    </p>

    <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; box-sizing: border-box;">

        <button onclick="forzarDescarga('https://github.com/Konecta-K9mP2qR7wL4nB8vX5cZ1jH6yT3sD0f/Suramericana/blob/main/Requisitos%20para%20la%20solicitud%20de%20reembolso%20por%20honorarios%20de%20abogados.pdf', 'Requisitos para la solicitud de reembolso por honorarios de abogados.pdf')" 
                class="btn-descarga"
                style="background-color: #2d6df6; color: white; padding: 14px 20px; border: none; border-radius: 6px; display: inline-block; font-weight: bold; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.15); width: 100%; max-width: 450px; text-align: left; box-sizing: border-box; cursor: pointer; font-family: sans-serif;">
           📥 Requisitos Reembolso Honorarios Abogados
        </button>

    </div>

    <script>
    function forzarDescarga(url, nombreArchivo) {
        fetch(url)
            .then(respuesta => {
                if (!respuesta.ok) throw new Error('404');
                return respuesta.blob();
            })
            .then(blob => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = nombreArchivo;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);
            })
            .catch(error => {
                // Si el fetch falla por CORS o caché, abre la URL directa en pestaña nueva para que baje limpio
                const linkElement = document.createElement('a');
                linkElement.href = url;
                linkElement.target = '_blank';
                linkElement.click();
            });
    }
    </script>

</body>
</html>
